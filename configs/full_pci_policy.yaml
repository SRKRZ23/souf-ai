version: '1.0'
policy_name: souf-ai-pci-pack-v0.1+souf-ai-pci-pack-v0.1
default_action: ALLOW
ingress_rules:
- name: pci_block_pan_disclosure_request
  description: PCI-DSS Req 3.3 — Block prompts asking the model to repeat / output
    / list cardholder data.
  priority: 102
  action: DENY
  deny_message: '[SOUF AI · PCI Pack] Blocked: request for cardholder data (PAN /
    CVV / track) violates Req 3.3.'
  conditions:
  - field: contains_pii_request
    match_type: boolean
    value: true
  - field: risk_score
    match_type: threshold
    value: 0.4
- name: pci_block_pan_in_ingress
  description: PCI-DSS Req 3.5 — Block ingress prompts containing visible PAN strings.
  priority: 101
  action: DENY
  deny_message: '[SOUF AI · PCI Pack] Blocked: ingress prompt contains visible PAN
    — violates Req 3.5.'
  conditions:
  - field: contains_pii
    match_type: boolean
    value: true
- name: block_prompt_injection
  description: Detected prompt injection attempt
  priority: 100
  action: DENY
  deny_message: '[LOBSTER TRAP] Blocked: prompt injection detected.'
  conditions:
  - field: contains_injection_patterns
    match_type: boolean
    value: true
- name: pci_block_pan_exfiltration
  description: PCI-DSS Req 4.2 — Block prompts asking to transmit cardholder data
    to external destinations.
  priority: 100
  action: DENY
  deny_message: '[SOUF AI · PCI Pack] Blocked: cardholder-data exfiltration violates
    Req 4.2.'
  conditions:
  - field: contains_exfiltration
    match_type: boolean
    value: true
- name: block_harm_violence
  description: Prompt requests instructions for violence, weapons, or harmful substances
  priority: 98
  action: DENY
  deny_message: '[LOBSTER TRAP] Blocked: request for harmful/violent content detected.'
  conditions:
  - field: contains_harm_patterns
    match_type: boolean
    value: true
- name: block_malware_request
  description: Prompt requests creation of malware, exploits, or offensive tools
  priority: 96
  action: DENY
  deny_message: '[LOBSTER TRAP] Blocked: malware/exploit generation request detected.'
  conditions:
  - field: contains_malware_request
    match_type: boolean
    value: true
- name: pci_block_admin_pretense
  description: PCI-DSS Req 8.3 — Block role-impersonation attempts in payment contexts.
  priority: 95
  action: DENY
  deny_message: '[SOUF AI · PCI Pack] Blocked: privileged-role impersonation violates
    Req 8.3.'
  conditions:
  - field: contains_role_impersonation
    match_type: boolean
    value: true
- name: block_phishing_fraud
  description: Prompt requests creation of phishing content or fraudulent materials
  priority: 94
  action: DENY
  deny_message: '[LOBSTER TRAP] Blocked: phishing/fraud content request detected.'
  conditions:
  - field: contains_phishing_patterns
    match_type: boolean
    value: true
- name: block_data_exfiltration
  description: Prompt contains data exfiltration patterns
  priority: 92
  action: DENY
  deny_message: '[LOBSTER TRAP] Blocked: data exfiltration attempt detected.'
  conditions:
  - field: contains_exfiltration
    match_type: boolean
    value: true
- name: block_obfuscation_evasion
  description: Prompt uses encoding or obfuscation to evade detection
  priority: 90
  action: DENY
  deny_message: '[LOBSTER TRAP] Blocked: obfuscation/evasion technique detected.'
  conditions:
  - field: contains_obfuscation
    match_type: boolean
    value: true
- name: pci_block_internal_vuln_scan
  description: PCI-DSS Req 11.4 — Block AI-driven vulnerability scanning of in-scope
    environment.
  priority: 90
  action: DENY
  deny_message: '[SOUF AI · PCI Pack] Blocked: unauthorized vulnerability scan violates
    Req 11.4.'
  conditions:
  - field: contains_malware_request
    match_type: boolean
    value: true
- name: review_role_impersonation
  description: Prompt attempts to assign a privileged role identity to the model
  priority: 86
  action: HUMAN_REVIEW
  conditions:
  - field: contains_role_impersonation
    match_type: boolean
    value: true
- name: block_sensitive_paths
  description: Prompt targets sensitive system paths
  priority: 85
  action: DENY
  deny_message: '[LOBSTER TRAP] Blocked: sensitive path access denied.'
  conditions:
  - field: contains_sensitive_paths
    match_type: boolean
    value: true
- name: block_pii_request
  description: High-confidence PII requests only — PCI educational queries excluded via pci_block_pan_disclosure_request (priority 102)
  priority: 82
  action: LOG
  deny_message: '[LOBSTER TRAP] Logged: possible PII request — risk below block threshold.'
  conditions:
  - field: contains_pii_request
    match_type: boolean
    value: true
- name: block_dangerous_commands
  description: Dangerous system commands detected
  priority: 80
  action: DENY
  deny_message: '[LOBSTER TRAP] Blocked: dangerous command detected.'
  conditions:
  - field: contains_system_commands
    match_type: boolean
    value: true
  - field: risk_score
    match_type: threshold
    value: 0.3
- name: pci_review_bulk_account_query
  description: PCI-DSS Req 7.2 — Bulk cardholder-data queries require role-based authorization
    → HUMAN_REVIEW.
  priority: 80
  action: HUMAN_REVIEW
  conditions:
  - field: contains_pii_request
    match_type: boolean
    value: true
  - field: intent_category
    match_type: exact
    value: data_access
- name: review_high_risk
  description: High risk score requires human review
  priority: 70
  action: HUMAN_REVIEW
  conditions:
  - field: risk_score
    match_type: threshold
    value: 0.6
- name: log_code_execution
  description: Log code execution requests
  priority: 30
  action: LOG
  conditions:
  - field: intent_category
    match_type: exact
    value: code_execution
- name: pci_log_all_data_access
  description: 'PCI-DSS Req 10.2 — Audit trail: log every data_access request.'
  priority: 5
  action: LOG
  conditions:
  - field: intent_category
    match_type: exact
    value: data_access
egress_rules:
- name: block_credential_leak
  description: Model output contains credentials
  priority: 100
  action: DENY
  deny_message: '[LOBSTER TRAP] Output blocked: contains credentials.'
  conditions:
  - field: contains_credentials
    match_type: boolean
    value: true
- name: pci_egress_block_pan_in_output
  description: PCI-DSS Req 3.5 — Block model output that contains a Primary Account
    Number pattern.
  priority: 100
  action: DENY
  deny_message: '[SOUF AI · PCI Pack · Egress] Output blocked: response contains PAN-like
    pattern.'
  conditions:
  - field: contains_pii
    match_type: boolean
    value: true
- name: pci_egress_block_credentials
  description: PCI-DSS Req 8.6 — Block egress of API keys / payment-API credentials.
  priority: 95
  action: DENY
  deny_message: '[SOUF AI · PCI Pack · Egress] Output blocked: payment-API credential
    disclosure.'
  conditions:
  - field: contains_credentials
    match_type: boolean
    value: true
- name: block_pii_leak
  description: Model output contains PII
  priority: 90
  action: DENY
  deny_message: '[LOBSTER TRAP] Output blocked: contains PII.'
  conditions:
  - field: contains_pii
    match_type: boolean
    value: true
rate_limits:
  requests_per_minute: 120
  requests_per_hour: 2000
  burst_threshold: 30
network:
  egress_policy: allowlist
  allowed_domains:
  - api.openai.com
  - api.anthropic.com
  denied_domains:
  - '*.onion'
  - pastebin.com
filesystem:
  denied_paths:
  - /etc/**
  - /root/**
  - '**/.ssh/**'
  - '**/.env'
  - '**/*secret*'
  - '**/*password*'
  allowed_read_paths:
  - /home/*/documents/**
  - /tmp/agent_workspace/**
  allowed_write_paths:
  - /home/*/documents/agent_output/**
  - /tmp/agent_workspace/**
