  <text x="1635" y="672" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#FF6B35" text-anchor="middle" font-weight="700">OPEN-SOURCE SOLUTIONS</text>
  <text x="1635" y="704" font-family="Arial Black, Arial, sans-serif" font-size="26" font-weight="900" fill="#FFFFFF" text-anchor="middle">ZERO. Until now.</text>

