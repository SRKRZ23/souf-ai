  <text x="960" y="86" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#FF6B35" text-anchor="middle" letter-spacing="3">EU AI ACT ENFORCEMENT · AUGUST 2, 2026 · $4.1B AI SECURITY MARKET · ZERO OPEN-SOURCE SOLUTIONS</text>

  <!-- RED SUB-HEADLINE -->
  <text x="60" y="130" font-family="Arial Black, Arial, sans-serif" font-size="20" font-weight="900" fill="#ED1C24">Enterprise LLM applications leak data. The clock is ticking.</text>

  <!-- MAIN HEADLINE -->
  <text x="60" y="180" font-family="Arial Black, Arial, sans-serif" font-size="50" font-weight="900" fill="#0A0A0A">Existing proxies block 39.6% of attacks.</text>
  <text x="60" y="236" font-family="Arial Black, Arial, sans-serif" font-size="50" font-weight="900" fill="#0A0A0A">EU enforcement starts <tspan fill="#ED1C24">August 2, 2026.</tspan></text>

  <!-- NEWS CARD 1: EU AI Act — orange left border -->
  <rect x="60" y="262" width="568" height="280" rx="4" fill="#F4F4F4" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="60" y="262" width="6" height="280" fill="#FF6B35"/>
  <text x="82" y="290" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#FF6B35" letter-spacing="1">EU AI ACT · ARTICLE 9 · AUGUST 2, 2026</text>
  <rect x="82" y="298" width="528" height="1" fill="#E0E0E0"/>
  <text x="82" y="322" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#0A0A0A" font-style="italic">"Providers of high-risk AI systems</text>
  <text x="82" y="344" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#0A0A0A" font-style="italic">shall establish, implement, document</text>
  <text x="82" y="366" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#0A0A0A" font-style="italic">and maintain a risk management system."</text>
  <rect x="82" y="382" width="528" height="1" fill="#E0E0E0"/>
  <text x="82" y="404" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#5A5A5A">High-risk AI faces fines up to €30M or 6% of global turnover.</text>
  <rect x="82" y="422" width="150" height="26" rx="3" fill="#FF6B35"/>
  <text x="157" y="440" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">€30M EXPOSURE</text>
  <text x="82" y="528" font-family="Courier New, Courier, monospace" font-size="12" fill="#999999">eur-lex.europa.eu · EU AI Act Art. 9(1)</text>

  <!-- NEWS CARD 2: OWASP — red left border -->
  <rect x="676" y="262" width="568" height="280" rx="4" fill="#F4F4F4" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="676" y="262" width="6" height="280" fill="#ED1C24"/>
  <text x="698" y="290" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#ED1C24" letter-spacing="1">OWASP LLM TOP 10 · 2025 EDITION · owasp.org</text>
  <rect x="698" y="298" width="528" height="1" fill="#E0E0E0"/>
  <text x="698" y="322" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#0A0A0A" font-style="italic">LLM01: Prompt Injection rated #1 critical</text>
  <text x="698" y="344" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#0A0A0A" font-style="italic">risk. "Attackers manipulate LLMs</text>
  <text x="698" y="366" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#0A0A0A" font-style="italic">through crafted inputs."</text>
  <rect x="698" y="382" width="528" height="1" fill="#E0E0E0"/>
  <text x="698" y="404" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#5A5A5A">Published standard — every enterprise deployment must address all 10 categories.</text>
  <rect x="698" y="422" width="170" height="26" rx="3" fill="#ED1C24"/>
  <text x="783" y="440" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">#1 CRITICAL RISK</text>
  <text x="698" y="528" font-family="Courier New, Courier, monospace" font-size="12" fill="#999999">owasp.org/www-project-top-10-for-large-language-model-applications</text>

  <!-- NEWS CARD 3: Competitors — black left border -->
  <rect x="1292" y="262" width="568" height="280" rx="4" fill="#F4F4F4" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="1292" y="262" width="6" height="280" fill="#0A0A0A"/>
  <text x="1314" y="290" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#0A0A0A" letter-spacing="1">TECHCRUNCH · LAKERA SERIES A · 2024</text>
  <rect x="1314" y="298" width="528" height="1" fill="#E0E0E0"/>
  <text x="1314" y="322" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#0A0A0A" font-style="italic">Lakera raises $20M to guard against</text>
  <text x="1314" y="344" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#0A0A0A" font-style="italic">prompt injection. No encoding attack</text>
  <text x="1314" y="366" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#0A0A0A" font-style="italic">defense. No HIPAA pack. Proprietary.</text>
  <rect x="1314" y="382" width="528" height="1" fill="#E0E0E0"/>
  <text x="1314" y="404" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#5A5A5A">Rebuff.ai: abandoned. Prompt Security: proprietary. LLM Guard: no compliance packs.</text>
  <rect x="1314" y="422" width="190" height="26" rx="3" fill="#0A0A0A"/>
  <text x="1409" y="440" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">$20M · GAPS REMAIN</text>
  <text x="1314" y="528" font-family="Courier New, Courier, monospace" font-size="12" fill="#999999">techcrunch.com · Crunchbase · public docs 2024</text>

  <!-- COMPARISON BAR -->
